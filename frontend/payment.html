<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Thanh toán PREMIUM - SentinelVN</title>

  <!-- CSS -->
  <link rel="stylesheet" href="assets/css/payment.css">

  <!-- QRCode.js để render mã QR từ chuỗi EMVCo -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>
<body>

<div class="card">
  <h2> Nâng cấp PREMIUM</h2>

  <!-- Loading -->
  <div id="loading-section">
    <p class="loading"> Đang tạo mã QR...</p>
  </div>

  <!-- Hiển thị QR -->
  <div id="qr-section" style="display:none">
    <p style="color:#94a3b8; margin-bottom:0.5rem">Quét mã QR để thanh toán</p>
    <div class="qr-box">
      <div id="qr-canvas"></div>
    </div>
    <div class="amount" id="amount-text"></div>
    <div class="order-id">Mã đơn: <span id="order-code"></span></div>
    <a id="checkout-link" class="link-btn" href="#" target="_blank">🔗 Thanh toán qua link</a>
    <br><br>
    <a href="index.html" class="back-link">← Quay lại</a>
  </div>

  <!-- Kết quả -->
  <div id="result-section" style="display:none">
    <div id="result-content"></div>
  </div>
</div>

<!-- JS -->
<script src="assets/js/payment.js"></script>

</body>
</html>
